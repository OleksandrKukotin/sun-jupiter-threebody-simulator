<main class="app-shell">
  <aside class="sidebar">
    <app-preset-list (presetRun)="onPresetRun($event)"/>
  </aside>

  <section class="plot-pane">
    @if (trajectoryResult(); as result) {
      <header class="plot-header">
        <h3>{{ selectedPreset()?.name }}</h3>
        <p>
          {{ result.points.length }} points ·
          C₀ = {{ result.initialJacobiConstant | number:'1.6-6' }} ·
          C_f = {{ result.finalJacobiConstant | number:'1.6-6' }}
        </p>
      </header>
      <app-trajectory-plot [result]="result" [lagrangePoints]="lagrangePoints()"/>
    } @else {
      <p class="empty-state">Select a preset to run a simulation.</p>
    }
  </section>
</main>
