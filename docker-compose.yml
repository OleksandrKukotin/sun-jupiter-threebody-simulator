services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cr3bp-backend
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cr3bp-frontend
    ports:
      - "8090:80"
    depends_on:
      - backend
    restart: unless-stopped